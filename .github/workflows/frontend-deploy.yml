name: Frontend Deploy

# Auto-deploy the static dashboard to S3 + CloudFront on changes to frontend/.
# Auth: GitHub OIDC -> AWS IAM role (no stored long-lived credentials).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

permissions:
  id-token: write      # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  FRONTEND_BUCKET: yminsight-frontend
  CLOUDFRONT_DISTRIBUTION_ID: E3O3E6FTW8G9K8

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # AI consult endpoint base URL (docs/feature-spec.md F4 v0.2) -- Vite inlines
          # this at build time. Repo variable, not a secret: it's a public API Gateway
          # URL with open CORS (infrastructure/modules/api). Unset -> consultAI() no-ops
          # and the drawer falls back to the local aiAnswer() stub.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          # Hashed assets are immutable -> long cache; index.html must revalidate.
          aws s3 sync dist/ "s3://${FRONTEND_BUCKET}/" --delete \
            --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp dist/index.html "s3://${FRONTEND_BUCKET}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
